version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: empathy
    ports:
      - '5432:5432'
  api:
    build: ../packages/api
    ports:
      - '3000:3000'
    env_file:
      - ../packages/api/.env.example
    depends_on:
      - db
